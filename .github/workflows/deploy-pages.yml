name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    name: Build static export
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - uses: actions/configure-pages@v5
        with:
          enablement: true # creates the Pages site on first run
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @pulse/contracts build
      - name: Build web (static export)
        run: pnpm --filter @pulse/web build
        env:
          # Project pages serve from /<repo>/ — computed, no hardcoding.
          NEXT_PUBLIC_BASE_PATH: /${{ github.event.repository.name }}
          # Point the portal at the hosted API (set in repo Variables).
          # GitHub Pages is static-only, so the NestJS API must live elsewhere.
          NEXT_PUBLIC_API_URL: ${{ vars.API_URL }}
      - uses: actions/upload-pages-artifact@v3
        with:
          path: apps/web/out

  deploy:
    name: Deploy
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
