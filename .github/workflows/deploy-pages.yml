name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write # pushes the gh-pages branch

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    name: Build & publish static export
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @pulse/contracts build
      - name: Build web (static export)
        run: pnpm --filter @pulse/web build
        env:
          # Project pages serve from /<repo>/ — computed, no hardcoding.
          NEXT_PUBLIC_BASE_PATH: /${{ github.event.repository.name }}
          # Point the portal at the hosted API (set in repo Variables).
          # GitHub Pages is static-only, so the NestJS API must live elsewhere.
          NEXT_PUBLIC_API_URL: ${{ vars.API_URL }}
      # Publishing the gh-pages branch auto-enables Pages on first deploy —
      # no admin token or manual Settings step required.
      - uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: apps/web/out
          force_orphan: true
