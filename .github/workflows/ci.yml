name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  DATABASE_URL: postgresql://pulse:pulse@localhost:5432/pulse_kpi
  REDIS_URL: redis://localhost:6379

jobs:
  # ── Stage 1: static quality gates ─────────────────────────────────────────
  quality:
    name: Lint & Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @pulse/api exec prisma generate
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm format:check

  # ── Stage 2: unit tests (no infrastructure) ───────────────────────────────
  unit:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @pulse/api exec prisma generate
      - run: pnpm test
        env:
          # apps/api's env module validates JWT_SECRET eagerly on import, same as
          # the integration/e2e jobs below — a dummy value here, real secrets in
          # deploy config.
          JWT_SECRET: ci-only-secret
      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: unit-coverage
          path: apps/api/coverage
          if-no-files-found: ignore

  # ── Stage 3: API integration tests against live Postgres + Redis ──────────
  integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: [quality, unit]
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: pulse
          POSTGRES_PASSWORD: pulse
          POSTGRES_DB: pulse_kpi
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U pulse"
          --health-interval 5s --health-timeout 5s --health-retries 10
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s --health-timeout 5s --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Generate client & build packages
        run: |
          pnpm --filter @pulse/api exec prisma generate
          pnpm --filter @pulse/contracts build
          pnpm --filter @pulse/api build
      - name: Migrate & seed database
        run: |
          pnpm --filter @pulse/api exec prisma migrate deploy
          pnpm db:seed
      - name: Start API
        run: |
          node apps/api/dist/main.js &
          npx wait-on http://localhost:4000/api/health --timeout 60000
        env:
          JWT_SECRET: ci-only-secret
      - name: Run integration suite
        run: pnpm --filter @pulse/api test:integration
        env:
          API_URL: http://localhost:4000

  # ── Stage 4: full E2E (web + api + db) ────────────────────────────────────
  # Runs in parallel with `integration`, not after it — they exercise
  # different things and each provisions its own Postgres/Redis, so chaining
  # them only added ~60s of dead time to the critical path for no benefit.
  # Still gated on quality+unit so a lint/typecheck/unit failure doesn't burn
  # 2-3 minutes standing up a full browser + stack run first.
  e2e:
    name: E2E Tests (Playwright)
    runs-on: ubuntu-latest
    needs: [quality, unit]
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: pulse
          POSTGRES_PASSWORD: pulse
          POSTGRES_DB: pulse_kpi
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U pulse"
          --health-interval 5s --health-timeout 5s --health-retries 10
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      # webkit is intentionally not run here — this job blocks every push/PR,
      # and running two browser engines roughly doubles both the install and
      # the test-run time for coverage that chromium already gives us for
      # nearly every one of these flows. Run webkit separately (e.g. a
      # nightly schedule) if cross-engine regressions become a real risk.
      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
      - name: Install Playwright chromium
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium
      # Cache hit skips the (slow) browser binary download, but the runner
      # VM itself is fresh every run, so the OS-level shared libraries still
      # need installing — this is the fast half of `--with-deps`.
      - name: Install Playwright OS dependencies
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium
      - name: Migrate, seed, build & start the stack
        run: |
          pnpm --filter @pulse/api exec prisma generate
          pnpm --filter @pulse/contracts build
          pnpm --filter @pulse/api exec prisma migrate deploy
          pnpm db:seed
          pnpm build
          node apps/api/dist/main.js &
          pnpm --filter @pulse/web start &
          npx wait-on http://localhost:4000/api/health http://localhost:3000 --timeout 120000
        env:
          JWT_SECRET: ci-only-secret
          NEXT_PUBLIC_API_URL: http://localhost:4000
      - run: pnpm test:e2e -- --project=chromium
      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report

  # ── Stage 5: security audit — a failure here fails this workflow, which
  # gates deploy-pages.yml (workflow_run, only fires on success) ────────────
  security:
    name: Dependency Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm audit --audit-level high

  # ── Stage 6: deploy — the only thing allowed to ship to prod ──────────────
  # Both services live on Render (see render.yaml). Render's own "auto-deploy
  # on push" must be turned OFF for both pulse-api and pulse-web in the Render
  # dashboard — otherwise Render deploys straight off the push webhook,
  # independent of and racing this job, and everything below is decorative.
  # With auto-deploy off, this job is the only path to production: it only
  # runs on a push to main, and only after every other stage (including the
  # security audit) has passed.
  #
  # Configure once: create a Deploy Hook for each Render service (Settings →
  # Deploy Hook) and save the two URLs as the repo secrets
  # RENDER_API_DEPLOY_HOOK_URL / RENDER_WEB_DEPLOY_HOOK_URL. Until those
  # secrets exist, the step below no-ops (with a warning) rather than fail,
  # so this ships safely before that one-time setup is done — but nothing
  # deploys until it is. (The `if:` conditions below can't reference
  # `secrets` directly — GitHub Actions doesn't support that context there —
  # so the presence check happens in the shell script instead, via `env:`.)
  deploy:
    name: Deploy (Render)
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [quality, unit, integration, e2e, security]
    steps:
      - name: Trigger Render deploys
        run: |
          triggered=0
          if [ -n "$API_HOOK_URL" ]; then
            curl -fsS -X POST "$API_HOOK_URL"
            triggered=1
          fi
          if [ -n "$WEB_HOOK_URL" ]; then
            curl -fsS -X POST "$WEB_HOOK_URL"
            triggered=1
          fi
          if [ "$triggered" = 0 ]; then
            echo "::warning::No RENDER_*_DEPLOY_HOOK_URL secrets set — this run passed every gate but deployed nothing. See the comment above this job for one-time setup."
          fi
        env:
          API_HOOK_URL: ${{ secrets.RENDER_API_DEPLOY_HOOK_URL }}
          WEB_HOOK_URL: ${{ secrets.RENDER_WEB_DEPLOY_HOOK_URL }}
