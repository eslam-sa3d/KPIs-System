# Render Blueprint — full-stack alternative to GitHub Pages hosting.
#
# GitHub Pages can only serve the static frontend; the NestJS API, Postgres,
# and Redis need a real host. This blueprint deploys ALL of it on one platform:
# connect the repo at https://dashboard.render.com/blueprints and Render
# provisions everything below (free tiers available for each service).
#
# After the first deploy:
#   - set CORS_ORIGINS on pulse-api to the pulse-web URL
#   - set WEB_URL on pulse-api to the same pulse-web URL (used to build the
#     link inside password-reset emails)
#   - set NEXT_PUBLIC_API_URL on pulse-web to the pulse-api URL
#   - set MAILERSEND_API_KEY on pulse-api to a MailerSend API key, and
#     optionally MAIL_FROM_EMAIL/MAIL_FROM_NAME (the sender identity — must be
#     a domain verified in MailerSend) — without a key, "forgot password"
#     emails are logged instead of sent, so the app still runs, it just can't
#     deliver a real reset link
#   - the first admin account is created automatically on first boot (the
#     start command runs `pnpm db:seed`, which is idempotent — safe on every
#     subsequent boot too) using SEED_ADMIN_EMAIL/SEED_ADMIN_PASSWORD below;
#     SEED_ADMIN_PASSWORD is Render-generated — fetch the actual value from
#     the pulse-api service's Environment tab after the first deploy and
#     change it after logging in (the seed script refuses to start in
#     production without this var set, rather than falling back to a
#     publicly-known default password)

services:
  - type: web
    name: pulse-api
    runtime: node
    plan: free
    # Render preinstalls pnpm (packageManager field) — corepack is unnecessary
    # and fails on the read-only image filesystem.
    #
    # NODE_ENV=development on just the install step: NODE_ENV is production
    # for this service (see envVars below) and Render exposes that during the
    # build too, but pnpm skips devDependencies — including the `prisma` CLI
    # this build needs — whenever NODE_ENV=production is set. Overriding it
    # for install only keeps the real runtime env (Express/helmet/the seed
    # script's production check) untouched.
    buildCommand: >-
      NODE_ENV=development pnpm install --frozen-lockfile &&
      pnpm --filter @pulse/contracts build &&
      pnpm --filter @pulse/api exec prisma generate &&
      pnpm --filter @pulse/api build
    # db:seed is idempotent (upserts) — running on boot replaces shell access,
    # which the free tier doesn't include. Each `migrate resolve` before it is
    # the same substitute for a one-off failed-migration fix: it only matters
    # if that exact migration is still stuck in a failed state, so `|| true`
    # makes it a safe no-op on every deploy after the first time it actually
    # resolves something — all three below are `--applied`, never
    # `--rolled-back`: on every pulse-db this history has actually touched
    # (the original, a from-empty recreate, and a pg_dump/restore clone of
    # the original), each of these migrations' real schema effects were
    # already present, so telling Prisma "not applied" is always the wrong
    # answer and (proven the hard way — see below) actively corrupts state.
    #
    # kpi_multi_rater_and_review_type used to resolve --rolled-back, back
    # when this line only ever ran against a fresh empty database where the
    # migration hadn't been recorded yet (resolve silently no-ops via
    # `|| true`, then `migrate deploy` applies it normally). The first time
    # this ran against a database where it was already correctly applied
    # (an old-account → new-account pg_dump/restore clone, which carries
    # `_prisma_migrations` over verbatim), --rolled-back succeeded at
    # actually flipping a correct "applied" record to "not applied" — so the
    # next `migrate deploy` would have tried to re-run its ALTER TABLE ADD
    # COLUMN statements against columns that already exist. --applied avoids
    # that regardless of which of these three histories the target database
    # actually has.
    #
    # drop_form_kpi_mapping resolves as --applied: its DROP TABLE had
    # already taken effect on the original database despite Prisma
    # recording the migration as failed, so resolving it "rolled back"
    # only re-fails forever against a table that's already gone.
    #
    # restore_form_kpi_mapping resolves as --applied for a related reason,
    # discovered when pulse-db got recreated from empty (free-tier Postgres
    # expiry) and every migration ran fresh in order: resolving
    # drop_form_kpi_mapping as --applied above skips running its actual DROP
    # TABLE, so on a brand-new database the table it was supposed to remove
    # is still there — and restore_form_kpi_mapping's CREATE TABLE then
    # collides with it (P3018/42P07). Its column list, indexes, and foreign
    # keys are byte-for-byte identical to what the table already has at that
    # point (form_kpi_mapping + kpi_multi_rater_and_review_type's ALTER), so
    # the desired end state already exists — Prisma just needs telling.
    #
    # user_must_change_password resolves as --rolled-back, unlike the three
    # above — deliberately, and only safe because its own migration.sql was
    # written with `ADD COLUMN IF NOT EXISTS` specifically so this is safe.
    # It got stuck "started, never finished" on its first deploy (two
    # concurrent deploys almost certainly raced and killed the first one
    # mid-ALTER — the free tier has no shell, so this couldn't just be
    # inspected and hand-fixed the way the three above originally were).
    # Unlike kpi_multi_rater_and_review_type's cautionary tale above,
    # --rolled-back here can't land on a column that already exists and then
    # fail retrying it, because IF NOT EXISTS makes the retry a no-op either
    # way — no need to know which of "never ran" or "ran but didn't record"
    # actually happened, unlike the --applied cases above which all depended
    # on knowing that.
    startCommand: >-
      pnpm --filter @pulse/api exec prisma migrate resolve --applied 20260710110000_kpi_multi_rater_and_review_type || true &&
      pnpm --filter @pulse/api exec prisma migrate resolve --applied 20260711120038_drop_form_kpi_mapping || true &&
      pnpm --filter @pulse/api exec prisma migrate resolve --applied 20260711140000_restore_form_kpi_mapping || true &&
      pnpm --filter @pulse/api exec prisma migrate resolve --rolled-back 20260713190000_user_must_change_password || true &&
      pnpm --filter @pulse/api exec prisma migrate deploy &&
      pnpm db:seed &&
      node apps/api/dist/main.js
    healthCheckPath: /api/health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: pulse-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: pulse-redis
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: NODE_ENV
        value: production
      # the seed script (run on every boot, see startCommand) refuses to
      # create the first admin with a default password when NODE_ENV is
      # production and this isn't set — generateValue makes that a non-issue
      - key: SEED_ADMIN_PASSWORD
        generateValue: true
      - key: SEED_ADMIN_EMAIL
        sync: false # optional — defaults to admin@pulse.local if unset
      # web and API live on separate *.onrender.com sites (PSL) — a Strict
      # cookie would never be sent cross-site and sessions would drop on reload
      - key: REFRESH_COOKIE_SAMESITE
        value: none
      - key: CORS_ORIGINS
        sync: false # set to the pulse-web URL after first deploy
      - key: WEB_URL
        sync: false # set to the pulse-web URL after first deploy
      - key: MAILERSEND_API_KEY
        sync: false # set to a MailerSend API key to enable real password-reset emails
      - key: MAIL_FROM_EMAIL
        sync: false # optional — must be a domain verified in MailerSend
      - key: MAIL_FROM_NAME
        sync: false # optional — defaults to "pulse"

  - type: web
    name: pulse-web
    runtime: static
    buildCommand: >-
      pnpm install --frozen-lockfile &&
      pnpm --filter @pulse/contracts build &&
      pnpm --filter @pulse/web build
    staticPublishPath: apps/web/out
    envVars:
      - key: NEXT_PUBLIC_API_URL
        sync: false # set to the pulse-api URL after first deploy
      # no NEXT_PUBLIC_BASE_PATH — Render serves from the domain root

  - type: keyvalue
    name: pulse-redis
    plan: free
    ipAllowList: [] # internal connections only

databases:
  - name: pulse-db
    plan: free
